name: Monthly Data Rebuild

on:
  schedule:
    - cron: '0 0 1 * *'  # Runs at 00:00 on the 1st of every month
  workflow_dispatch:      # Allows manual trigger from the GitHub UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to push the updated data back to the repo

    steps:
      - name: Checkout Hub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests numpy

      - name: Setup Raw Data Directory
        run: mkdir -p raw_data

      - name: Pull Raw Source Repositories
        run: |
          git clone --bare --depth 1000 https://github.com/bitcoin/bitcoin.git raw_data/bitcoin
          git clone --depth 1000 https://github.com/bitcoin/bips.git raw_data/bips_repo
          git clone --depth 1000 https://github.com/jamesob/delving-bitcoin-archive.git raw_data/delving

      - name: Run Data Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/rebuild.py

      - name: Commit and Push Processed Artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git status
          git commit -m "Automated Monthly Data Refresh [$(date +%Y-%m-%d)]" || echo "No changes to commit"
          git push origin main
